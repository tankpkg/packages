[pytest]
markers =
    airport_lookup: Airport IATA code resolution tests
    search_google_flights: Google Flights via fast-flights tests
    flight_tracker: Price tracking watch list tests
    flight_status: Live flight status tests
    search_flights: SerpAPI/Amadeus flight search tests
    price_calendar: Price calendar tests
    requires_fast_flights: Requires fast-flights package installed
    requires_rapidapi: Requires RAPIDAPI_KEY env var
    requires_serpapi: Requires SERPAPI_KEY env var
    requires_amadeus: Requires AMADEUS_CLIENT_ID and AMADEUS_CLIENT_SECRET
    requires_travelpayouts: Requires TRAVELPAYOUTS_TOKEN env var
